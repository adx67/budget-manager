const DonutChart = ({ categories, totalBudget, language, tLanguage, currencySymbol }) => {
  const canvasRef = useRef(null);
  const chartInstanceRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !window.Chart) return;
    
    if (chartInstanceRef.current) {
      chartInstanceRef.current.destroy();
    }

    const ctx = canvasRef.current.getContext('2d');
    const numericTotal = Number(totalBudget) || 0;
    const allocated = categories.reduce((sum, c) => sum + (Number(c.amount) || 0), 0);
    const unallocated = Math.max(0, numericTotal - allocated);
    
    const dataLabels = categories.map(c => typeof c.name === 'object' ? c.name[language] || c.name.en : c.name);
    const dataValues = categories.map(c => c.amount);
    const bgColors = categories.map(c => c.color);
    
    if (unallocated > 0) {
      dataLabels.push(tLanguage.unallocated);
      dataValues.push(unallocated);
      bgColors.push(document.documentElement.classList.contains('dark') ? '#334155' : '#e2e8f0');
    }

    if (numericTotal === 0 && dataValues.length === 0) {
      dataLabels.push('Empty');
      dataValues.push(1);
      bgColors.push(document.documentElement.classList.contains('dark') ? '#334155' : '#e2e8f0');
    }

    chartInstanceRef.current = new window.Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: dataLabels,
        datasets: [{
          data: dataValues,
          backgroundColor: bgColors,
          borderWidth: 0,
          hoverOffset: 12
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '72%',
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: document.documentElement.classList.contains('dark') ? '#1e293b' : '#ffffff',
            titleColor: document.documentElement.classList.contains('dark') ? '#f8fafc' : '#0f172a',
            bodyColor: document.documentElement.classList.contains('dark') ? '#cbd5e1' : '#475569',
            borderColor: document.documentElement.classList.contains('dark') ? '#334155' : '#e2e8f0',
            borderWidth: 1,
            padding: 12,
            cornerRadius: 8,
            boxPadding: 6,
            usePointStyle: true,
            callbacks: {
              label: function(context) {
                let label = context.label || '';
                if (label) label += ': ';
                if (context.parsed !== null && Number(totalBudget) > 0) {
                  label += new Intl.NumberFormat(language === 'ar' ? 'ar-SA' : language === 'fr' ? 'fr-FR' : 'en-US').format(context.parsed) + ' ' + currencySymbol;
                }
                return label;
              }
            }
          }
        },
        animation: { animateScale: true, animateRotate: true }
      }
    });

    return () => {
      if (chartInstanceRef.current) chartInstanceRef.current.destroy();
    };
  }, [categories, totalBudget, language, tLanguage]);

  return (
    <div className="w-full h-72 relative">
      <canvas ref={canvasRef} />
      <div className="absolute inset-0 flex items-center justify-center pointer-events-none pb-2">
        <div className="text-center bg-white/60 dark:bg-slate-800/60 backdrop-blur-md px-6 py-4 rounded-full shadow-sm border border-white/20 dark:border-slate-700/50">
            <p className="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">{tLanguage.totalBudget}</p>
            <p className="text-2xl font-bold text-slate-800 dark:text-white">
                {new Intl.NumberFormat(language === 'ar' ? 'ar-SA' : language === 'fr' ? 'fr-FR' : 'en-US').format(Number(totalBudget) || 0)} <span className="text-sm font-normal text-slate-500">{currencySymbol}</span>
            </p>
        </div>
      </div>
    </div>
  );
};

const CategoryItem = ({ category, totalBudget, onChange, onDelete, language, tLanguage, currencySymbol }) => {
  const [isEditing, setIsEditing] = useState(false);
  const [editAmount, setEditAmount] = useState(category.amount);
  const numericTotal = Number(totalBudget) || 0;
  const [editPercent, setEditPercent] = useState(numericTotal > 0 ? (category.amount / numericTotal * 100).toFixed(1) : 0);
  
  const percentage = numericTotal > 0 ? ((category.amount / numericTotal) * 100).toFixed(1) : 0;
  
  const handleAmountChange = (e) => {
    if (e.target.value === '') {
      setEditAmount('');
      setEditPercent(0);
      return;
    }
    let val = parseFloat(e.target.value);
    if (isNaN(val) || val < 0) val = 0;
    setEditAmount(val);
    setEditPercent(numericTotal > 0 ? (val / numericTotal * 100).toFixed(1) : 0);
  };

  const handlePercentChange = (e) => {
    if (e.target.value === '') {
      setEditPercent('');
      setEditAmount(0);
      return;
    }
    let val = parseFloat(e.target.value);
    if (isNaN(val) || val < 0) val = 0;
    if (val > 100) val = 100;
    setEditPercent(val);
    setEditAmount((val / 100) * numericTotal);
  };

  const save = () => {
    onChange({ ...category, amount: editAmount });
    setIsEditing(false);
  };

  const catName = typeof category.name === 'object' ? category.name[language] || category.name.en : category.name;

  return (
    <motion.div 
      initial={{ opacity: 0, y: 10 }}
      animate={{ opacity: 1, y: 0 }}
      exit={{ opacity: 0, scale: 0.95 }}
      whileHover={{ scale: 1.01 }}
      className="bg-white dark:bg-slate-800/80 p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700/50 flex flex-col gap-3 transition-all duration-300"
    >
      <div className="flex items-center justify-between">
        <div className="flex items-center gap-4">
          <div className="w-12 h-12 rounded-2xl flex items-center justify-center text-white shadow-lg" style={{ backgroundColor: category.color, boxShadow: `0 4px 14px 0 ${category.color}40` }}>
            <Icon name={category.icon} className="w-6 h-6" />
          </div>
          <div>
            <h3 className="font-bold text-slate-800 dark:text-slate-100">{catName}</h3>
            {!isEditing && (
              <p className="text-sm font-medium text-slate-500 dark:text-slate-400">
                {new Intl.NumberFormat().format(category.amount)} {currencySymbol} 
                <span className="mx-2 text-slate-300 dark:text-slate-600">•</span>
                <span className="text-primary font-bold">{percentage}%</span>
              </p>
            )}
          </div>

let audioCtx = null;
const playSound = (type = 'click') => {
  try {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'click') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.1);
    }
  } catch (e) {}
};

        {/* Total Budget Hero Section */}
        <motion.div 
          initial={{ opacity: 0, y: 20 }}
          animate={{ opacity: 1, y: 0 }}
          className="bg-white dark:bg-slate-800/80 rounded-3xl shadow-2xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-700/50 p-8 md:p-10 mb-10 overflow-hidden relative"
        >
          <div className="absolute -top-24 -right-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
          <div className="absolute -bottom-24 -left-24 w-64 h-64 bg-emerald-400/5 rounded-full blur-3xl"></div>
          
          <div className="relative z-10 flex flex-col md:flex-row items-start md:items-center justify-between gap-6">
              <div className="flex-1 w-full">
                <label className="block text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-3">{tLanguage.totalBudget}</label>
                <div className="relative flex items-end">
                    <input 
                    type="number"
                    value={totalBudget}
                    onChange={e => setTotalBudget(e.target.value === '' ? '' : parseFloat(e.target.value))}
                    className="w-full text-5xl md:text-7xl font-extrabold bg-transparent border-none focus:outline-none focus:ring-0 p-0 m-0 dark:text-white transition-colors"
                    min="0"
                    />
                    <span className="text-2xl font-medium text-slate-400 mb-2 ml-2 mr-2">{currencySymbol}</span>
                </div>
                <div className="h-1 w-full bg-slate-100 dark:bg-slate-700 mt-4 rounded-full overflow-hidden">
                    <div className="h-full bg-gradient-to-r from-primary to-emerald-400 transition-all duration-500" style={{ width: `${Math.min(100, (allocated/(Number(totalBudget)||1))*100 || 0)}%` }}></div>
                </div>
              </div>
              
              <button onClick={resetData} className="flex items-center gap-2 px-5 py-3 rounded-xl bg-slate-100 dark:bg-slate-700/50 text-slate-600 dark:text-slate-300 font-medium hover:bg-red-50 hover:text-red-500 dark:hover:bg-red-500/10 transition-all active:scale-95">
                <Icon name="RefreshCw" className="w-5 h-5" />
                <span className="md:hidden">{tLanguage.resetData}</span>
              </button>
          </div>
          
          <AnimatePresence>
            {errorMsg && (
              <motion.div initial={{ opacity: 0, y: -10 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, height: 0 }} className="mt-6 flex items-center gap-3 text-red-500 bg-red-50 dark:bg-red-500/10 p-4 rounded-xl text-sm font-medium border border-red-100 dark:border-red-500/20">
                <Icon name="AlertCircle" className="w-5 h-5 flex-shrink-0" />
                {errorMsg}
              </motion.div>
            )}
          </AnimatePresence>
        </motion.div>

        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
          
          {/* Left Column */}
          <div className="lg:col-span-5 space-y-8">
            <motion.div 
              initial={{ opacity: 0, x: -20 }}
              animate={{ opacity: 1, x: 0 }}
              transition={{ delay: 0.1 }}
              className="bg-white dark:bg-slate-800/80 rounded-3xl shadow-xl shadow-slate-200/40 dark:shadow-none border border-slate-100 dark:border-slate-700/50 p-8"
            >
              <h2 className="text-lg font-bold text-slate-800 dark:text-white mb-8 flex items-center gap-2">
                  <Icon name="PieChart" className="w-5 h-5 text-primary" /> {tLanguage.summary}
              </h2>
              
              <DonutChart categories={categories} totalBudget={totalBudget} language={language} tLanguage={tLanguage} currencySymbol={currencySymbol} />
              
              <div className="mt-8">
                <div className={`relative overflow-hidden bg-gradient-to-br p-5 rounded-2xl border ${remaining < 0 ? 'from-red-50 to-red-100 dark:from-red-900/20 dark:to-red-900/10 border-red-200 dark:border-red-800/50' : 'from-emerald-50 to-emerald-100 dark:from-emerald-900/20 dark:to-emerald-900/10 border-emerald-200 dark:border-emerald-800/50'}`}>
                  {isWealthy && <Particles type="wealth" />}
                  {isPoor && <Particles type="poverty" />}
                  <div className="relative z-10">
                    <p className={`text-xs font-semibold uppercase tracking-wider mb-2 ${remaining < 0 ? 'text-red-500' : 'text-emerald-600 dark:text-emerald-400'}`}>{tLanguage.remaining}</p>
                    <p className={`text-xl font-bold ${remaining < 0 ? 'text-red-600 dark:text-red-400' : 'text-emerald-700 dark:text-emerald-300'}`}>
                      {new Intl.NumberFormat().format(remaining)} <span className="text-sm font-normal opacity-70">{currencySymbol}</span>
                    </p>
                  </div>
                </div>
              </div>
            </motion.div>
            
            <motion.div 
              initial={{ opacity: 0, y: 20 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ delay: 0.2 }}
              className="bg-white dark:bg-slate-800/80 rounded-3xl shadow-xl shadow-slate-200/40 dark:shadow-none border border-slate-100 dark:border-slate-700/50 p-6 flex items-center justify-between"
            >
              <div className="flex items-center gap-4">
                  <div className="p-3 bg-slate-100 dark:bg-slate-700/50 rounded-xl text-slate-500 dark:text-slate-300">
                    <Icon name="Palette" className="w-6 h-6" />
                  </div>
                  <p className="font-semibold text-slate-700 dark:text-slate-200">{tLanguage.primaryColor}</p>
              </div>
              <div className="flex gap-2">
                {availableColors.slice(0, 5).map(c => (
                  <button 
                    key={c} onClick={() => setPrimaryColor(c)}
                    className={`w-8 h-8 rounded-full transition-all duration-300 ${primaryColor === c ? 'scale-125 ring-4 ring-offset-2 dark:ring-offset-slate-800 ring-slate-200 dark:ring-slate-600' : 'hover:scale-110'}`}
                    style={{ backgroundColor: c }}
                  />
                ))}
              </div>
            </motion.div>
          </div>

          {/* Right Column */}
          <div className="lg:col-span-7">
            <div className="flex items-center justify-between mb-8">
              <h2 className="text-xl font-bold text-slate-800 dark:text-white flex items-center gap-3">
                {tLanguage.categoriesCount} 
                <span className="bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 px-3 py-1 rounded-lg text-sm">{categories.length}</span>
              </h2>
              <button 
                onClick={() => setShowAddForm(!showAddForm)}
                className="flex items-center gap-2 bg-slate-800 dark:bg-white text-white dark:text-slate-900 px-5 py-2.5 rounded-xl hover:bg-slate-700 dark:hover:bg-slate-200 transition-all shadow-lg active:scale-95 font-semibold"
              >
                <Icon name={showAddForm ? 'X' : 'Plus'} className="w-5 h-5" />
                <span className="hidden sm:inline">{showAddForm ? tLanguage.cancel : tLanguage.addCategory}</span>
              </button>
            </div>

            <AnimatePresence>
              {showAddForm && (
                <motion.div 
                  initial={{ opacity: 0, height: 0, scale: 0.95 }}
                  animate={{ opacity: 1, height: 'auto', scale: 1 }}
                  exit={{ opacity: 0, height: 0, scale: 0.95 }}
                  className="mb-6 overflow-hidden"
                >
                  <AddCategory onAdd={(cat) => { setCategories([...categories, cat]); setShowAddForm(false); }} onCancel={() => setShowAddForm(false)} tLanguage={tLanguage} language={language} />
                </motion.div>
              )}
            </AnimatePresence>

            <div className="space-y-4">
              <AnimatePresence>
                {categories.length === 0 ? (
                  <motion.div 
                    initial={{ opacity: 0 }} animate={{ opacity: 1 }} 
                    className="text-center py-20 bg-white/50 dark:bg-slate-800/30 rounded-3xl border-2 border-slate-200 dark:border-slate-700 border-dashed backdrop-blur-sm"
                  >
                    <Icon name="PieChart" className="w-16 h-16 mx-auto mb-4 text-slate-300 dark:text-slate-600" />
                    <p className="text-lg text-slate-500 dark:text-slate-400 font-medium">{tLanguage.noCategories}</p>
                    <button onClick={() => setShowAddForm(true)} className="mt-4 text-primary font-semibold hover:underline">
                        {tLanguage.addCategory}
                    </button>
                  </motion.div>
                ) : (
                  categories.map(cat => (
                    <CategoryItem 
                      key={cat.id} 
                      category={cat} 
                      totalBudget={totalBudget}
                      onChange={(updatedCat) => setCategories(categories.map(c => c.id === updatedCat.id ? updatedCat : c))}
                      onDelete={(id) => setCategories(categories.filter(c => c.id !== id))}
                      language={language}
                      tLanguage={tLanguage}
                      currencySymbol={currencySymbol}
                    />
                  ))
                )}
              </AnimatePresence>
            </div>
          </div>
        </div>
      </main>
    </motion.div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>
